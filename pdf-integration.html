<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing Analysis with PDF Reports</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Include jsPDF library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Include JSZip library for decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Include your existing styles -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .analysis-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .analysis-section.active {
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 15px 0;
        }

        .stat-card {
            background: white;
            padding: 15px 10px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
        }

        .race-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
        }

        .race-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            
            transition: background 0.2s;
            display: flex;
    justify-content: space-between;
    align-items: center;
}

        .race-item:hover {
            background: #f0f4ff;
        }

.race-item-info {
    flex: 1;
}

.race-item-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-left: 10px;
}

.race-item-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}

        .race-item:last-child {
            border-bottom: none;
        }

        .progress-section {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .log-section {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

.log-section.visible {
    display: block;
}

        .drop-zone {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .drop-zone:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .drop-zone.dragover {
            background: #e8f2ff;
            border-color: #764ba2;
            border-style: solid;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .drop-zone-text {
            font-size: 1.1em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .drop-zone-subtext {
            font-size: 0.9em;
            color: #666;
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .file-info-name {
            font-weight: bold;
            color: #2e7d32;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐎 Horse Racing Analysis</h1>
        </div>

        <!-- File Upload Section -->
        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Drag & Drop your .DRF or .ZIP file here</div>
                <div class="drop-zone-subtext">or click to browse</div>
            </div>
            <input type="file" id="fileInput" accept=".DRF,.drf,.ZIP,.zip">

            <div class="file-info" id="fileInfo">
                <div class="file-info-name">
                    <span id="fileName"></span>
                    <span id="fileSize" style="margin-left: 10px; font-weight: normal; color: #555;"></span>
                </div>
            </div>


        </div>

        <!-- Analysis Results Section -->
        <div class="analysis-section" id="analysisSection">
            <h3>📊 Analysis Results</h3>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalRaces">0</div>
                    <div class="stat-label">Total Races</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalHorses">0</div>
                    <div class="stat-label">Total Horses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalTrainers">0</div>
                    <div class="stat-label">Trainers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalJockeys">0</div>
                    <div class="stat-label">Jockeys</div>
                </div>
            </div>

            <h4>📋 Races</h4>
            <div class="race-list" id="raceList"></div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" id="generatePdfBtn" disabled>📄 Generate PDF Report</button>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="progress-section" id="progressSection">
            <h4>Generating PDF Report...</h4>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">Initializing...</p>
        </div>

        <!-- Log Section -->
        <div class="log-section" id="logSection">
            <div id="logContent"></div>
        </div>
    </div>

    <!-- Include your data model classes -->
    <script src="racing-data-model.js"></script>
    <script src="pdf-report-generator.js"></script>

    <!-- Include DRF-specific parser and generator -->
    <script src="drf-parser.js"></script>
    <script src="drf-pdf-generator.js?v=1.2.3"></script>

    <script>
        // Check for debug mode via query string
        const urlParams = new URLSearchParams(window.location.search);
        const debugMode = urlParams.has('debug') || urlParams.has('log');

        // Global variables
        let raceDataArray = [];
        let relationalData = null;
        let drfData = null; // DRF parsed data
        let selectedRaceId = null;
        const { jsPDF } = window.jspdf;

        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');

        const analysisSection = document.getElementById('analysisSection');
        const generatePdfBtn = document.getElementById('generatePdfBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const logSection = document.getElementById('logSection');
        const logContent = document.getElementById('logContent');

        // Event listeners
        fileInput.addEventListener('change', handleFileSelect);

        generatePdfBtn.addEventListener('click', generateFullReport);
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', handleDragOver);
        dropZone.addEventListener('dragleave', handleDragLeave);
        dropZone.addEventListener('drop', handleDrop);

        // Prevent default drag behaviors on the document
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDragOver(e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                const fileName = file.name.toUpperCase();
                if (fileName.endsWith('.DRF') || fileName.endsWith('.ZIP')) {
                    // Set the file to the input element
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;

                    // Trigger file select handler
                    handleFileSelect({ target: { files: [file] } });
                } else {
                    alert('Please drop a .DRF or .ZIP file');
                }
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            const fileNameUpper = file ? file.name.toUpperCase() : '';

            if (file && (fileNameUpper.endsWith('.DRF') || fileNameUpper.endsWith('.ZIP'))) {


                // Display file info
                const fileType = fileNameUpper.endsWith('.ZIP') ? '📦 (Compressed)' : '📄';
                fileName.textContent = `${fileType} ${file.name}`;
                fileSize.textContent = `(${formatFileSize(file.size)})`;
                fileInfo.classList.add('active');

                // Update drop zone appearance
                dropZone.querySelector('.drop-zone-text').textContent = 'File loaded successfully!';
                dropZone.querySelector('.drop-zone-icon').textContent = '✅';
                dropZone.style.borderColor = '#4caf50';
                dropZone.style.background = '#e8f5e9';

                log(`File selected: ${file.name} (${formatFileSize(file.size)})`);

                if (fileNameUpper.endsWith('.ZIP')) {
                    log('Compressed .ZIP file detected - will decompress during analysis');
                }

        // Auto-analyze data after file is loaded
        setTimeout(() => analyzeData(), 100);
            } else {
                alert('Please select a .DRF or .ZIP file');

                fileInfo.classList.remove('active');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function analyzeData() {
            const file = fileInput.files[0];
            if (!file) return;

            try {
                const fileNameUpper = file.name.toUpperCase();
                let content;

                if (fileNameUpper.endsWith('.ZIP')) {
                    log('Reading compressed .ZIP file...');
                    content = await decompressZipFile(file);
                } else if (fileNameUpper.endsWith('.DRF')) {
                    log('Reading .DRF text file...');
                    content = await readFileAsText(file);
                } else {
                    throw new Error('Unsupported file format. Please use .DRF or .ZIP files.');
                }

                log('Parsing DRF data...');
                const parser = new DRFParser();
                drfData = parser.parseContent(content);

                log(`Parsed ${drfData.totalRaces} races with ${drfData.totalHorses} horses`);
                // Also parse with old method for compatibility
                log('Converting to relational objects...');
                raceDataArray = parseCSVContent(content);
                const processor = new RacingDataProcessor();
                relationalData = processor.processRawData(raceDataArray);

                log('Analysis complete!');
                displayAnalysisResults();

            } catch (error) {
                log(`Error: ${error.message}`);
                console.error('Full error:', error);
                alert('Error analyzing data: ' + error.message);
            }
        }

        function displayAnalysisResults() {
            if (!drfData) {
                log('No DRF data available');
                return;
            }

            // Log detailed summary for debugging
            log(`DRF Data - Track: ${drfData.trackCode}, Date: ${drfData.date}`);
            log(`Summary - Races: ${drfData.totalRaces}, Horses: ${drfData.totalHorses}`);

            // Count unique trainers and jockeys
            const trainers = new Set();
            const jockeys = new Set();
            drfData.races.forEach(race => {
                race.horses.forEach(horse => {
                    if (horse.trainer) trainers.add(horse.trainer);
                    if (horse.jockey) jockeys.add(horse.jockey);
                });
            });

            // Update statistics
            document.getElementById('totalRaces').textContent = drfData.totalRaces;
            document.getElementById('totalHorses').textContent = drfData.totalHorses;
            document.getElementById('totalTrainers').textContent = trainers.size;
            document.getElementById('totalJockeys').textContent = jockeys.size;

            // Display race list
            const raceList = document.getElementById('raceList');
            raceList.innerHTML = '';

            drfData.races.forEach(race => {
                const raceItem = document.createElement('div');
                raceItem.className = 'race-item';
                raceItem.innerHTML = `
                    <div class="race-item-info">
                        <strong>Race ${race.raceNumber}</strong> - ${race.distanceInFurlongs} ${race.surface} | ${race.classification} | ${race.horses.length} horses | $${formatNumber(race.purse)}
                    </div>
                    <button class="race-item-btn" onclick="event.stopPropagation(); openRaceGraphics(${race.raceNumber});">Visualization</button>
                `;
                raceItem.addEventListener('click', () => selectRace(race.raceNumber));
                raceList.appendChild(raceItem);
            });

            // Show analysis section and enable PDF generation
            analysisSection.classList.add('active');
            generatePdfBtn.disabled = false;
    if (debugMode) logSection.style.display = 'block';
        }

        function selectRace(raceId) {
            selectedRaceId = raceId;

            // Highlight selected race
            document.querySelectorAll('.race-item').forEach(item => {
                item.style.background = '';
            });
            event.target.style.background = '#e8f2ff';

            log(`Selected race: ${raceId}`);
        }

        async function generateFullReport() {
            if (!drfData) {
                alert('No data available. Please analyze a file first.');
                return;
            }

            try {
                showProgress();
                updateProgress(10, 'Initializing PDF generator...');
                log('Starting PDF generation...');

                // Validate data structure
                if (!drfData.races || drfData.races.length === 0) {
                    throw new Error('No races found in data');
                }

                log(`Found ${drfData.races.length} races to process`);

                const generator = new DRFPDFGenerator();

                updateProgress(30, 'Processing race data...');

                // Add some delay to show progress
                await new Promise(resolve => setTimeout(resolve, 500));

                updateProgress(60, 'Generating PDF pages...');
                log('Calling PDF generator...');

                const filename = `${drfData.trackCode}_${drfData.date}_report.pdf`;
                generator.generateReport(drfData, filename);

                updateProgress(100, 'PDF generated successfully!');
                log(`Full report generated: ${filename}`);

                setTimeout(hideProgress, 2000);

            } catch (error) {
                log(`Error generating PDF: ${error.message}`);
                log(`Error stack: ${error.stack}`);
                console.error('Full error object:', error);
                alert('Error generating PDF: ' + error.message);
                hideProgress();
            }
        }

        // Helper functions
        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        async function decompressZipFile(file) {
            return new Promise(async (resolve, reject) => {
                try {
                    log('Decompressing .ZIP file...');

                    // Read file as array buffer
                    const arrayBuffer = await readFileAsArrayBuffer(file);

                    // Load with JSZip
                    const zip = await JSZip.loadAsync(arrayBuffer);

                    log(`Archive contains ${Object.keys(zip.files).length} file(s)`);

                    // Find .DRF file in the archive
                    let drfFile = null;
                    let drfFileName = null;

                    for (let fileName in zip.files) {
                        const fileNameUpper = fileName.toUpperCase();
                        if (fileNameUpper.endsWith('.DRF')) {
                            drfFileName = fileName;
                            drfFile = zip.files[fileName];
                            break;
                        }
                    }

                    if (!drfFile) {
                        throw new Error('No .DRF file found in the .ZIP archive');
                    }

                    log(`Found .DRF file: ${drfFileName}`);
                    log('Extracting content...');

                    // Extract as text
                    const content = await drfFile.async('text');

                    log(`Extracted ${content.length} characters from ${drfFileName}`);
                    resolve(content);

                } catch (error) {
                    reject(new Error(`Failed to decompress .ZIP file: ${error.message}`));
                }
            });
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function parseCSVContent(content) {
            const lines = content.split(/\r?\n/).filter(line => line.trim().length > 0);
            return lines.map(line => parseCSVLine(line));
        }

        function parseCSVLine(line) {
            const fields = [];
            let current = '';
            let inQuotes = false;
            let i = 0;

            while (i < line.length) {
                const char = line[i];

                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i += 2;
                    } else {
                        inQuotes = !inQuotes;
                        i++;
                    }
                } else if (char === ',' && !inQuotes) {
                    fields.push(current.trim());
                    current = '';
                    i++;
                } else {
                    current += char;
                    i++;
                }
            }

            fields.push(current.trim());
            return fields;
        }

        function showProgress() {
            progressSection.style.display = 'block';
            progressFill.style.width = '0%';
        }

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }

        function hideProgress() {
            progressSection.style.display = 'none';
        }

        function log(message) {
    const logSection = document.getElementById('logSection');
    
    // Show log section if in debug mode
    if (debugMode && logSection) {
        logSection.classList.add('visible');
    }
    
    
    const timestamp = new Date().toLocaleTimeString();
    logContent.innerHTML += `[${timestamp}] ${message}<br>`;
    logContent.scrollTop = logContent.scrollHeight;
}

        // Open race graphics page
        function openRaceGraphics(raceNumber) {
            if (!drfData) {
                alert('No race data loaded!');
                return;
            }
            
            // Find the race data
            const race = drfData.races.find(r => r.raceNumber == raceNumber);
            if (!race) {
                alert('Race not found!');
                return;
            }
            
            // Store race data in sessionStorage for the new page
            sessionStorage.setItem('currentRaceData', JSON.stringify(race));
            sessionStorage.setItem('allRacesData', JSON.stringify(drfData));
            
            // Open new window
            window.open('race-graphics.html', '_blank');
        }

        function formatNumber(numStr) {
            const num = parseFloat(numStr) || 0;
            return num.toLocaleString();
        }
    </script>
</body>
</html>
